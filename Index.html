<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERVERT — release</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'JetBrains Mono',monospace;}

  .split{
    display:flex;
    width:100vw;height:100vh;
  }
  .half{
    width:50%;height:100%;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .half.black{background:#0a0a0a;}
  .half.white{background:#f4f4f2;}
  .half img{
    max-width:62%;
    max-height:78%;
    object-fit:contain;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,.25));
  }

  .wordmark{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-family:'Anton',sans-serif;
    font-size:clamp(56px,14vw,220px);
    letter-spacing:.01em;
    color:#fff;
    mix-blend-mode:difference;
    white-space:nowrap;
    pointer-events:none;
    user-select:none;
    z-index:5;
  }

  .info{
    position:fixed;
    bottom:34px;left:0;right:0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:22px;
    color:#fff;
    mix-blend-mode:difference;
    font-size:13px;
    letter-spacing:.06em;
    z-index:5;
    flex-wrap:wrap;
    text-align:center;
    padding:0 20px;
  }
  .info .price{display:flex;align-items:baseline;gap:8px;}
  .price .old{text-decoration:line-through;opacity:.55;}
  .price .new{font-size:16px;font-weight:500;}
  .info .badge{
    border:1px solid currentColor;
    padding:4px 10px;
    border-radius:999px;
  }

  @media (max-width:720px){
    html,body{overflow:auto;}
    .split{flex-direction:column;height:auto;min-height:100vh;}
    .half{width:100%;height:52vh;}
    .half img{max-width:70%;max-height:82%;}
    .wordmark{position:absolute;top:50%;}
    .info{position:absolute;bottom:16px;font-size:11px;gap:14px;}
  }
</style>
</head>
<body>

<div class="split">
  <div class="half black">
    <img src="tee-white.png" alt="PERVERT tee, white colorway">
  </div>
  <div class="half white">
    <img src="tee-black.png" alt="PERVERT tee, black colorway">
  </div>
</div>

<div class="wordmark">PERVERT</div>

<div class="info">
  <span class="price"><span class="old">3000₽</span><span class="new">2000₽</span></span>
  <span class="badge">−33%</span>
  <span class="badge">LIMITED EDITION</span>
</div>

</body>
</html>
